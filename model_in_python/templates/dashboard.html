<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Conveyor Digital Twin — Live Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
    body {
        background: #0f1117;
        color: #e5e7eb;
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 24px;
    }
    h1 {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 4px;
    }
    #status-line {
        font-size: 13px;
        color: #9ca3af;
        margin-bottom: 20px;
    }
    .badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 999px;
        font-weight: 600;
        font-size: 12px;
    }
    .badge.ok { background: #064e3b; color: #6ee7b7; }
    .badge.anomaly { background: #7f1d1d; color: #fca5a5; }
    .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }
    .card {
        background: #171923;
        border: 1px solid #262b3a;
        border-radius: 10px;
        padding: 16px;
    }
    .card h2 {
        font-size: 14px;
        font-weight: 500;
        color: #9ca3af;
        margin: 0 0 12px 0;
    }
    canvas {
        max-height: 320px;
    }
</style>
</head>
<body>
    <h1>Conveyor Digital Twin — Real vs Virtual</h1>
    <div id="status-line">
        Status: <span id="status-badge" class="badge ok">--</span>
        &nbsp;|&nbsp; Last update: <span id="last-update">--</span>
    </div>

    <div class="grid">
        <div class="card">
            <h2>Speed (RPM)</h2>
            <canvas id="rpmChart"></canvas>
        </div>
        <div class="card">
            <h2>Current (A)</h2>
            <canvas id="currentChart"></canvas>
        </div>
    </div>

<script>
const MAX_POINTS = 60;       // Max samples on screen
const POLL_MS = 500;         // Poll interval
const RPM_ERR_THRESHOLD = 5.0;
const CURRENT_ERR_THRESHOLD = 0.05;

const chartOptions = {
    responsive: true,
    animation: false,
    interaction: { mode: 'nearest', intersect: false },
    scales: {
        x: { ticks: { color: '#9ca3af' }, grid: { color: '#262b3a' } },
        y: { ticks: { color: '#9ca3af' }, grid: { color: '#262b3a' } }
    },
    plugins: { legend: { labels: { color: '#e5e7eb' } } }
};

const rpmChart = new Chart(document.getElementById('rpmChart'), {
    type: 'line',
    data: { labels: [], datasets: [
        { label: 'Real RPM', data: [], borderColor: '#60a5fa', backgroundColor: 'transparent', tension: 0.25, pointRadius: 0 },
        { label: 'Virtual RPM', data: [], borderColor: '#f59e0b', backgroundColor: 'transparent', tension: 0.25, pointRadius: 0 }
    ]},
    options: chartOptions
});

// initializer 
const currentChart = new Chart(document.getElementById('currentChart'), {
    type: 'line',
    data: { labels: [], datasets: [
        { label: 'Real Current', data: [], borderColor: '#34d399', backgroundColor: 'transparent', tension: 0.25, pointRadius: 0 },
        { label: 'Virtual Current', data: [], borderColor: '#f472b6', backgroundColor: 'transparent', tension: 0.25, pointRadius: 0 }
    ]},
    options: chartOptions
});

function fmtTime(unixSeconds) {
    const d = new Date(unixSeconds * 1000);
    return d.toLocaleTimeString();
}


async function backfillHistory() {
    try {
        const resp = await fetch(`/history?n=${MAX_POINTS}`);
        if (!resp.ok) return;
        const data = await resp.json();
        if (!Array.isArray(data) || data.length === 0) return;

        //charts
        rpmChart.data.labels = data.map(d => fmtTime(d.t));
        rpmChart.data.datasets[0].data = data.map(d => d.real_rpm);
        rpmChart.data.datasets[1].data = data.map(d => d.virtual_rpm);

        currentChart.data.labels = data.map(d => fmtTime(d.t));
        currentChart.data.datasets[0].data = data.map(d => d.real_current);
        currentChart.data.datasets[1].data = data.map(d => d.virtual_current);

        updateChartsAndUI(data[data.length - 1]);
    } catch (err) {
        console.error("Backfill failed:", err);
    }
}

async function pollLatest() {
    try {
        const resp = await fetch('/latest');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const entry = await resp.json();
        if (!entry || !entry.t) return;

        const timeStr = fmtTime(entry.t);
        if (rpmChart.data.labels.length > 0 && rpmChart.data.labels[rpmChart.data.labels.length - 1] === timeStr) {
            return;
        }

        
        rpmChart.data.labels.push(timeStr);
        rpmChart.data.datasets[0].data.push(entry.real_rpm);
        rpmChart.data.datasets[1].data.push(entry.virtual_rpm);

        
        currentChart.data.labels.push(timeStr);
        currentChart.data.datasets[0].data.push(entry.real_current);
        currentChart.data.datasets[1].data.push(entry.virtual_current);

        
        if (rpmChart.data.labels.length > MAX_POINTS) {
            rpmChart.data.labels.shift();
            rpmChart.data.datasets[0].data.shift();
            rpmChart.data.datasets[1].data.shift();

            currentChart.data.labels.shift();
            currentChart.data.datasets[0].data.shift();
            currentChart.data.datasets[1].data.shift();
        }

        updateChartsAndUI(entry);
    } catch (err) {
        const badge = document.getElementById('status-badge');
        badge.textContent = 'Server unreachable';
        badge.className = 'badge anomaly';
    }
}

function updateChartsAndUI(latest) {
    rpmChart.update('none');
    currentChart.update('none');

    const badge = document.getElementById('status-badge');
    const isAnomaly = latest.rpm_error > RPM_ERR_THRESHOLD || latest.current_error > CURRENT_ERR_THRESHOLD;

    badge.textContent = isAnomaly
        ? `ANOMALY (ΔRPM ${latest.rpm_error.toFixed(2)}, ΔI ${latest.current_error.toFixed(3)}A)`
        : `Nominal (ΔRPM ${latest.rpm_error.toFixed(2)}, ΔI ${latest.current_error.toFixed(3)}A)`;
    badge.className = 'badge ' + (isAnomaly ? 'anomaly' : 'ok');
    document.getElementById('last-update').textContent = fmtTime(latest.t);
}

async function init() {
    await backfillHistory();
    setInterval(pollLatest, POLL_MS);
}

init();
</script>
</body>
</html>
